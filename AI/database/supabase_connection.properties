# Supabase Database Connection Configuration
# PostgreSQL JDBC Driver

# Database Connection
db.driver=org.postgresql.Driver
db.url=jdbc:postgresql://localhost:5432/ai_workflow
db.username=postgres
db.password=YOUR_PASSWORD_HERE

# Connection Pool Settings
db.maxPoolSize=20
db.minPoolSize=5
db.initialPoolSize=10
db.maxIdleTime=300
db.maxConnectionAge=3600

# SSL Configuration
db.ssl=false
db.sslmode=prefer

# Connection Timeout Settings
db.connectTimeout=30
db.socketTimeout=30

# Statement Settings
db.defaultRowFetchSize=1000
db.queryTimeout=30

# Retry Settings
db.retryAttempts=3
db.retryDelay=1000

# Pool Validation
db.testConnectionOnCheckout=true
db.testConnectionOnCheckin=true
db.idleConnectionTestPeriod=60

# Additional PostgreSQL Settings
db.stringtype=unspecified
db.preparedStatementCacheQueries=256
db.preparedStatementCacheSizeMiB=5
