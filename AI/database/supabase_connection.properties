# Supabase Database Connection Configuration
# PostgreSQL JDBC Driver

# Database Connection
db.driver=org.postgresql.Driver
db.url=jdbc:postgresql://[YOUR-PROJECT-REF].supabase.co:5432/postgres
db.username=postgres
db.password=[YOUR-SUPABASE-PASSWORD]

# Connection Pool Settings
db.maxPoolSize=20
db.minPoolSize=5
db.initialPoolSize=10
db.maxIdleTime=300
db.maxConnectionAge=3600

# SSL Configuration (Required for Supabase)
db.ssl=true
db.sslmode=require
db.sslfactory=org.postgresql.ssl.DefaultJavaSSLFactory

# Connection Timeout Settings
db.connectTimeout=30
db.socketTimeout=30

# Statement Settings
db.defaultRowFetchSize=1000
db.queryTimeout=30

# Retry Settings
db.retryAttempts=3
db.retryDelay=1000

# Pool Validation
db.testConnectionOnCheckout=true
db.testConnectionOnCheckin=true
db.idleConnectionTestPeriod=60

# Additional PostgreSQL Settings
db.stringtype=unspecified
db.preparedStatementCacheQueries=256
db.preparedStatementCacheSizeMiB=5

# Supabase Specific Settings
supabase.url=https://[YOUR-PROJECT-REF].supabase.co
supabase.anonKey=[YOUR-ANON-KEY]
supabase.serviceRoleKey=[YOUR-SERVICE-ROLE-KEY]
supabase.projectRef=[YOUR-PROJECT-REF]
